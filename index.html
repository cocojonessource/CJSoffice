<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Source's Office</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body data-profile="public">
  <main class="reception">
    <div class="office-sign">
      SOURCE'S OFFICE
    </div>

    <div class="desk">
      <div class="computer-screen">
        <p class="small-text">
          You’ve arrived at
        </p>

        <h1>Source's Office</h1>

        <p class="question">
          Are you ready to step inside?
        </p>

        <div class="buttons">
          <button id="yesButton" type="button">
            Yes
          </button>

          <button id="noButton" type="button">
            No
          </button>
        </div>

        <p id="responseMessage"></p>
      </div>

      <div class="desk-items">
        <div class="coffee">☕</div>

        <div class="folder">
          IDEAS
        </div>

        <div class="plant">🌷</div>
      </div>
    </div>
  </main>

  <script>
    localStorage.setItem(
      "sourceOfficeProfile",
      "public"
    );
  </script>

  <script src="script.js"></script>
</body>
</html>
